name: Automated Testing (CI)

on:
  push:
    branches: [ "feature/ocr-implementation", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: パッケージのインストール
        run: npm install

      - name: Firebase CLIのインストール
        run: npm install -g firebase-tools

      - name: 【テスト1】単体テスト(Unit) の実行
        run: npx vitest run tests/unit/ocr.test.js

      - name: 【テスト2】セキュリティ(Rules) テスト の実行
        run: npx firebase emulators:exec --project demo-test "npx vitest run tests/rules/firestore.rules.test.js"

      - name: Playwrightブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: 【テスト3】E2E(UI) テスト の実行
        run: npx playwright test
