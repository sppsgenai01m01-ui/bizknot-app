<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 名刺登録</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- ヘッダー -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">名刺登録</h1>
        <a href="/dashboard.html" class="text-gray-600 hover:text-gray-800">キャンセル</a>
    </header>

    <!-- メインコンテンツ -->
    <main class="p-8 flex flex-col items-center justify-center text-center">

        <!-- PC向け: ドラッグ＆ドロップ -->
        <div id="drop-zone" class="hidden md:flex flex-col items-center justify-center w-full max-w-lg p-12 border-4 border-dashed border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer">
            <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-4-4V7a4 4 0 014-4h10a4 4 0 014 4v5a4 4 0 01-4 4H7z"></path></svg>
            <p class="mt-4 text-lg text-gray-600">ここにファイルをドラッグ＆ドロップ</p>
            <p class="mt-1 text-sm text-gray-500">または</p>
            <button id="file-select-button" class="mt-4 bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-4 border border-gray-300 rounded shadow">ファイルを選択</button>
            <input type="file" id="file-input" class="hidden" accept="image/jpeg, image/png, image/jpg">
        </div>

        <!-- スマホ向け: カメラ -->
        <div id="camera-view" class="md:hidden w-full max-w-md flex flex-col items-center">
            <label for="camera-input" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-lg text-xl cursor-pointer text-center flex items-center justify-center shadow-lg transition duration-200">
                <svg class="w-8 h-8 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                カメラを起動する
            </label>
            <input type="file" id="camera-input" class="hidden" accept="image/*" capture="environment">
            
            <div class="mt-6 text-center w-full">
                <p class="text-sm text-gray-500 mb-3">または</p>
                <button id="mobile-file-select-button" class="w-full bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 px-4 border border-gray-300 rounded-lg shadow transition duration-200">アルバム/フォルダから選択</button>
            </div>
        </div>

         <p class="mt-4 text-sm text-gray-500">.jpeg, .jpg, .png (最大5MB)</p>

         <!-- 手動入力へのリンク（逃げ道） -->
         <div class="mt-12 text-center">
            <a href="/business_card_form.html" class="text-blue-600 hover:text-blue-800 underline font-semibold transition duration-200">
                名刺の画像がない場合（手動で直接入力する）
            </a>
         </div>
    </main>

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="text-center text-white">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mx-auto"></div>
            <p class="mt-4 text-lg font-bold">AI（Tesseract）で画像を解析中...</p>
            <p class="mt-2 text-sm text-gray-300">※初回のみ辞書データのダウンロードに少し時間がかかります</p>
        </div>
    </div>

    <!-- Firebase SDK (不足していたものを追加) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="/app.js"></script>

    <!-- Tesseract.js (安全・完全無料のブラウザOCRライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script src="/creation.js"></script>
</body>
</html>
