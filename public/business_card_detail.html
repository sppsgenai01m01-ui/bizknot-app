
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 名刺詳細</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- ヘッダー -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-20">
        <h1 class="text-xl font-bold">名刺詳細</h1>
        <a href="/business_card_list.html" class="text-sm text-gray-600 hover:text-gray-800">一覧に戻る</a>
    </header>

    <!-- メインコンテンツ -->
    <main id="detail-container" class="p-4 md:p-8 opacity-0 transition-opacity duration-500">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <!-- 左カラム/上部: 画像 -->
            <div class="md:col-span-1">
                <img id="card-image" src="https://placehold.jp/300x200.png?text=Loading..." alt="名刺画像" class="w-full rounded-lg shadow-md cursor-pointer">
            </div>

            <!-- 右カラム/下部: 詳細情報 -->
            <div class="md:col-span-2">
                <!-- 基本情報 -->
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 id="person-name" class="text-2xl font-bold"></h2>
                    <p id="company-name" class="text-lg text-gray-700 mt-1"></p>
                    <p id="department-title" class="text-md text-gray-500"></p>
                    
                    <div class="mt-6 border-t pt-4 space-y-3">
                        <div id="email-field"></div>
                        <div id="phone-field"></div>
                        <div id="address-field"></div>
                    </div>
                </div>

                <!-- カスタム項目 -->
                <div id="custom-fields-display" class="bg-white p-6 rounded-lg shadow mt-6">
                    <h3 class="text-lg font-semibold mb-4">その他の情報</h3>
                     <div id="custom-fields-list-display" class="space-y-3"></div>
                </div>

                <!-- アクションボタン -->
                <div class="mt-8 flex flex-wrap gap-4">
                    <button id="edit-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">編集</button>
                    <button id="delete-button" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">削除</button>
                    <button id="history-button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">更新履歴</button>
                </div>
            </div>
        </div>
    </main>

    <!-- ローディング/スケルトン -->
    <div id="loading-skeleton" class="p-8">
       <!-- ... スケルトンUI ... -->
    </div>
    
    <script src="/detail.js"></script>
</body>
</html>
