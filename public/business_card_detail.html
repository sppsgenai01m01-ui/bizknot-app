
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺詳細 - BizKnot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-900">
                名刺詳細
            </h1>
            <a href="/business_card_list.html" class="text-blue-500 hover:underline">← 一覧に戻る</a>
        </div>
    </header>

    <main>
        <div class="max-w-4xl mx-auto py-8 sm:px-6 lg:px-8">
            <div id="loading" class="text-center">
                <p>読み込み中...</p>
            </div>
            <div id="card-detail-container" class="hidden bg-white shadow overflow-hidden sm:rounded-lg">
                <!-- 名刺詳細情報はここに動的に挿入されます -->
            </div>
            <div id="error-message" class="hidden text-center text-red-500 mt-4">
                <p>名刺が見つかりませんでした。</p>
            </div>

            <div class="mt-8 text-right">
                <button id="delete-button" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="button">
                    この名刺を削除
                </button>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- App Scripts -->
    <script src="app.js"></script>
    <script src="detail.js"></script>

</body>
</html>
