<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名刺詳細 - BizKnot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-900">
                名刺詳細
            </h1>
            <a href="/business_card_list.html" class="text-blue-500 hover:underline">← 一覧に戻る</a>
        </div>
    </header>

    <main>
        <div class="max-w-6xl mx-auto py-8 sm:px-6 lg:px-8">
            
            <!-- スケルトンUI（読み込み中） -->
            <div id="loading-skeleton" class="animate-pulse p-8 bg-white shadow rounded-lg mb-8">
                <div class="flex space-x-4">
                    <div class="rounded bg-gray-200 h-48 w-64"></div>
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                        <div class="space-y-2">
                            <div class="h-4 bg-gray-200 rounded"></div>
                            <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="hidden text-center text-red-500 mt-4">
                <p>名刺が見つかりませんでした。</p>
            </div>

            <!-- 名刺詳細コンテナ（2カラム構成） -->
            <div id="detail-container" class="opacity-0 transition-opacity duration-500 grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- 左カラム: 名刺画像 -->
                <div class="md:col-span-1">
                    <div class="bg-white p-4 rounded-lg shadow sticky top-6">
                        <img id="card-image" src="" alt="名刺画像" class="w-full object-contain rounded hover:opacity-80 transition-opacity cursor-pointer">
                    </div>
                </div>

                <!-- 右カラム: 詳細情報 -->
                <div class="md:col-span-2">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 id="person-name" class="text-2xl font-bold"></h2>
                        <p id="company-name" class="text-lg text-gray-700 mt-1"></p>
                        <p id="department-title" class="text-md text-gray-500"></p>
                        
                        <!-- アプローチ情報（最終連絡） -->
                        <div class="mt-4 p-4 bg-green-50 rounded-lg border border-green-100 flex items-center justify-between">
                            <div>
                                <p class="text-xs font-bold text-green-700 uppercase tracking-wider mb-1">最終連絡日時</p>
                                <p id="last-contact-date" class="text-lg font-bold text-gray-800">-</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-green-700 uppercase tracking-wider mb-1">連絡のきっかけ</p>
                                <p id="last-contact-trigger" class="text-sm font-semibold text-gray-700">-</p>
                            </div>
                            <!-- テスト用手動更新ボタン -->
                            <button id="test-update-contact-btn" class="text-xs bg-white border border-green-300 text-green-600 px-2 py-1 rounded hover:bg-green-100">更新テスト</button>
                        </div>

                        <div class="mt-6 border-t pt-4 space-y-3">
                            <div id="email-field"></div>
                            <div id="company-phone-field"></div>
                            <div id="mobile-phone-field"></div>
                            <div id="fax-field"></div>
                            <div id="address-field"></div>
                        </div>
                    </div>

                    <!-- カスタム項目 & メモ -->
                    <div id="custom-fields-display" class="bg-white p-6 rounded-lg shadow mt-6" style="display: none;">
                        <h3 class="text-lg font-semibold mb-4 border-b pb-2">その他の情報</h3>
                        <div id="custom-fields-list-display" class="space-y-3 mb-4"></div>
                        <div id="notes-display" class="mt-4 pt-4 border-t">
                            <h4 class="text-sm font-semibold text-gray-600 mb-2">メモ</h4>
                            <p id="notes-text" class="text-gray-800 whitespace-pre-wrap"></p>
                        </div>
                    </div>

                    <!-- ▼▼ MVP追加機能: AIサジェスト & マッピング情報 ▼▼ -->
                    <div id="ai-context-panel" class="bg-blue-50 border border-blue-100 p-6 rounded-lg shadow mt-6">
                        <div class="flex justify-between items-center mb-4 border-b border-blue-100 pb-2">
                            <h3 class="text-lg font-bold text-blue-900">
                                自社とのマッピング・AI分析
                            </h3>
                            <button id="edit-tags-history-btn" class="text-sm text-blue-600 hover:underline">編集</button>
                        </div>
                        
                        <div class="mb-4">
                            <h4 class="text-xs font-bold text-blue-500 mb-2">タグ（AI抽出）</h4>
                            <div id="ai-tags-container" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="mb-5">
                            <h4 class="text-xs font-bold text-blue-500 mb-2">自社との過去の接点・プロジェクト履歴</h4>
                            <ul id="project-history-container" class="space-y-2 text-sm text-gray-700 bg-white p-3 rounded border border-blue-100"></ul>
                        </div>
                        <button id="ai-draft-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition-colors text-center">
                            AIにアプローチ文面を作成させる
                        </button>
                    </div>
                    <!-- ▲▲ MVP追加機能 ここまで ▲▲ -->

                    <!-- アクションボタン -->
                    <div class="mt-8 flex flex-wrap gap-4">
                        <button id="edit-button" class="bg-white border border-blue-500 text-blue-500 hover:bg-blue-50 font-bold py-2 px-6 rounded shadow">編集</button>
                        <button id="history-button" class="bg-white border border-gray-500 text-gray-500 hover:bg-gray-50 font-bold py-2 px-6 rounded shadow" style="display: none;">更新履歴</button>
                        <button id="delete-button" class="bg-white border border-red-500 text-red-500 hover:bg-red-50 font-bold py-2 px-6 rounded shadow" style="display: none;">削除</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- ライトボックスモーダル（画像拡大） -->
    <div id="lightbox-modal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[100] hidden cursor-pointer transition-opacity duration-300">
        <button id="close-lightbox-btn" class="absolute top-4 right-4 text-white hover:text-gray-300 w-10 h-10 flex items-center justify-center bg-gray-800 bg-opacity-50 hover:bg-opacity-100 rounded-full transition-colors z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="lightbox-image" src="" alt="名刺拡大画像" class="max-w-full max-h-screen object-contain p-4 cursor-default">
    </div>

    <!-- AIプロンプト選択ダイアログ -->
    <div id="ai-prompt-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                                AIアプローチ文面の作成
                            </h3>
                            
                            <!-- ① 入力画面 -->
                            <div id="ai-prompt-input-panel" class="mt-4">
                                <p class="text-sm text-gray-500 mb-2">設定画面で保存したデフォルトプロンプト（指示文）を選択してください。</p>
                                <select id="ai-prompt-select" class="w-full p-2 border border-gray-300 rounded mb-4 focus:outline-none focus:border-blue-500">
                                    <option value="">（選択してください）</option>
                                    <!-- JSで挿入 -->
                                </select>
                                
                                <p class="text-sm text-gray-500 mb-1">プロンプト内容（ここで微調整も可能です）:</p>
                                <textarea id="ai-prompt-textarea" rows="4" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"></textarea>
                            </div>

                            <!-- ② 生成結果画面 -->
                            <div id="ai-prompt-result-panel" class="hidden mt-4 space-y-4">
                                <p class="text-sm text-green-600 font-semibold flex items-center gap-1"><i class="fas fa-check-circle text-green-500"></i>アプローチ文面を作成しました。</p>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 mb-1">生成された文面（編集可能です）</label>
                                    <textarea id="ai-generated-text" rows="8" class="w-full p-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"></textarea>
                                </div>
                                <div class="flex gap-2">
                                    <button type="button" id="copy-generated-btn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded text-sm transition shadow-sm border border-gray-200">
                                        コピーする
                                    </button>
                                    <button type="button" id="launch-mailer-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm transition flex items-center justify-center gap-1 shadow-sm">
                                        <i class="fas fa-envelope"></i>
                                        メールソフト起動
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6" id="ai-prompt-modal-footer">
                    <!-- ① 入力画面用のボタン -->
                    <div id="ai-prompt-input-buttons" class="sm:flex sm:flex-row-reverse w-full">
                        <button type="button" id="submit-ai-prompt-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
                            作成開始
                        </button>
                        <button type="button" id="cancel-ai-prompt-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            キャンセル
                        </button>
                    </div>
                    <!-- ② 生成結果画面用のボタン -->
                    <div id="ai-prompt-result-buttons" class="hidden sm:flex sm:flex-row-reverse w-full">
                        <button type="button" id="close-ai-prompt-result-btn" class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:w-auto sm:text-sm">
                            閉じる
                        </button>
                        <button type="button" id="back-to-prompt-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-blue-500 text-blue-600 hover:bg-blue-50 shadow-sm px-4 py-2 bg-white text-base font-medium sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            プロンプトを再編集
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- タグ・履歴編集ダイアログ -->
    <div id="edit-context-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="w-full">
                        <h3 class="text-lg leading-6 font-medium text-gray-900">
                            タグ・接点履歴の編集
                        </h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">タグ（カンマ区切りで入力）</label>
                                <input type="text" id="edit-tags-input" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="VIP, 2026展示会...">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">自社との過去の接点・プロジェクト履歴（改行でリスト化）</label>
                                <textarea id="edit-history-input" rows="4" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="2025/10: Aプロジェクトで協業&#10;2026/04: ご挨拶"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" id="save-context-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                        保存
                    </button>
                    <button type="button" id="cancel-context-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        キャンセル
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKを追加 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/app.js"></script>
    <script src="/detail.js"></script>
</body>
</html>
