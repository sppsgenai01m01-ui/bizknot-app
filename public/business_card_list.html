<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 名刺一覧</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- ヘッダー -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-20">
        <h1 class="text-xl font-bold text-blue-800">BizKnot</h1>
         <div class="flex items-center">
            <a href="/dashboard.html" class="text-sm text-gray-600 hover:text-blue-600 mr-4 font-semibold">ダッシュボード</a>
            <span id="user-name-display" class="text-sm bg-gray-200 px-3 py-1 rounded-full text-gray-700 hidden md:inline"></span>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="container mx-auto p-4 md:p-8">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-2xl font-bold text-gray-800">名刺一覧・検索</h2>
            <button id="export-csv-button" class="hidden md:flex bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow-md items-center transition duration-200 text-sm md:text-base">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span>CSVエクスポート</span>
            </button>
        </div>

        <!-- 検索フォーム (SCR-006 準拠) -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="search-keyword" placeholder="氏名、会社名で検索..." class="col-span-1 md:col-span-3 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                <button id="search-button" class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 font-bold shadow-md transition duration-200">検索する</button>
            </div>
            
            <!-- 詳細検索トグル -->
            <div class="mt-4 border-t border-gray-100 pt-4">
                <button id="toggle-advanced-search" class="text-blue-500 hover:text-blue-700 text-sm font-bold flex items-center transition">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    詳細検索（フィルター）を開く
                </button>
                
                <div id="advanced-search-panel" class="hidden mt-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">部署・役職</label>
                        <input type="text" id="search-department" placeholder="例: 営業部長" class="w-full p-2 border rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">メールアドレス</label>
                        <input type="text" id="search-email" placeholder="例: sample@example.com" class="w-full p-2 border rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">住所・所在地</label>
                        <input type="text" id="search-address" placeholder="例: 東京都渋谷区" class="w-full p-2 border rounded-md text-sm">
                    </div>
                </div>
            </div>
        </div>

        <div id="card-list-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 初期表示用のスケルトン -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 animate-pulse">
                 <div class="h-32 bg-gray-200 rounded-lg mb-4"></div>
                 <div class="h-4 bg-gray-300 rounded w-1/2 mb-2"></div>
                 <div class="h-6 bg-gray-400 rounded w-3/4 mb-2"></div>
                 <div class="h-4 bg-gray-200 rounded w-full"></div>
            </div>
        </div>

        <!-- 無限スクロール用監視要素 -->
        <div id="scroll-sentinel" class="h-16 mt-8 flex justify-center items-center">
            <div id="loading-more-spinner" class="hidden animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-600"></div>
        </div>
    </main>

    <!-- 新規登録FAB -->
    <a href="/business_card_creation.html" class="fixed bottom-8 right-8 bg-green-500 hover:bg-green-600 text-white rounded-full p-4 shadow-xl z-10 transition transform hover:scale-110">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
    </a>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- スクリプト -->
    <script src="app.js"></script>
    <script src="list.js"></script>
</body>
</html>
