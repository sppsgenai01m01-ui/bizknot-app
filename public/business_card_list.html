<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 人脈ネットワーク</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

    <!-- PC用サイドバー (PCでのみ表示) -->
    <aside class="hidden lg:flex flex-col w-64 bg-slate-900 text-white shadow-xl h-full flex-shrink-0">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-lg shadow flex items-center justify-center">
                    <i class="fas fa-id-card text-xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">BizKnot</h1>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="/dashboard.html" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl font-medium transition-colors">
                <i class="fas fa-home w-6"></i>
                ダッシュボード
            </a>
            <a href="/business_card_list.html" class="flex items-center px-4 py-3 bg-blue-600/20 text-blue-400 rounded-xl font-medium transition-colors">
                <i class="fas fa-address-book w-6"></i>
                人脈ネットワーク
            </a>
            <a href="/business_card_creation.html" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl font-medium transition-colors">
                <i class="fas fa-plus-circle w-6"></i>
                名刺を取り込む
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツエリア -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- スマホ用トップヘッダー -->
        <header class="lg:hidden glass-header text-slate-900 shadow-sm sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200">
            <div class="px-4 h-16 flex justify-between items-center">
                <h1 class="text-lg font-bold">人脈ネットワーク</h1>
                <button id="export-csv-button-mobile" class="text-slate-500 hover:text-green-600">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </header>

        <!-- スクロール可能なメイン領域 -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 lg:pb-8 flex flex-col">
            
            <!-- ヘッダー（PC用） -->
            <div class="hidden lg:flex justify-between items-end mb-6">
                <h2 class="text-2xl font-bold text-slate-800">全社ネットワーク検索</h2>
                <button id="export-csv-button" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-semibold py-2 px-4 rounded-lg shadow-sm transition duration-200 text-sm flex items-center">
                    <i class="fas fa-download mr-2 text-green-600"></i>
                    CSVエクスポート
                </button>
            </div>

            <!-- 【レビューアー向け仕様メモ】 -->
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg">
                <h3 class="text-sm font-bold text-blue-800 flex items-center">
                    <i class="fas fa-info-circle mr-2"></i>【モック確認用・機能仕様】同僚の接点可視化（横断検索）
                </h3>
                <p class="text-xs text-blue-700 mt-1">
                    検索結果のテーブルに「登録者（社内接点）」列を配置しています。企業名で検索した際、自社の「誰」がその企業と名刺交換しているかが一覧で可視化され、**担当不在でも過去の社内ネットワークを活用できる価値**を提供します。
                </p>
            </div>

            <!-- 検索フォーム -->
            <div class="glass-panel p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 bg-white flex-shrink-0">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="text" id="search-keyword" placeholder="会社名、氏名、部署で検索..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                    </div>
                    <button id="search-button" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 font-bold shadow-sm transition duration-200 flex-shrink-0">
                        検索
                    </button>
                </div>
            </div>

            <!-- データコンテナ（ここでPC/スマホ表示をJSで切り替えるためのラッパー） -->
            <div class="flex-1 glass-panel rounded-2xl shadow-sm border border-slate-200 bg-white overflow-hidden flex flex-col">
                
                <!-- PC用 データテーブル (lg以上で表示) -->
                <div class="hidden lg:block overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-sm">
                                <th class="p-4 font-semibold w-16 text-center">名刺</th>
                                <th class="p-4 font-semibold">氏名</th>
                                <th class="p-4 font-semibold">会社名・部署</th>
                                <th class="p-4 font-semibold">連絡先</th>
                                <th class="p-4 font-semibold">登録者（社内接点）</th>
                                <th class="p-4 font-semibold w-24">アクション</th>
                            </tr>
                        </thead>
                        <tbody id="pc-table-body" class="divide-y divide-slate-100">
                            <!-- JSで挿入 -->
                            <tr class="animate-pulse">
                                <td class="p-4"><div class="w-10 h-10 bg-slate-200 rounded-full mx-auto"></div></td>
                                <td class="p-4"><div class="h-4 bg-slate-200 rounded w-24"></div></td>
                                <td class="p-4"><div class="h-4 bg-slate-200 rounded w-48 mb-1"></div><div class="h-3 bg-slate-100 rounded w-32"></div></td>
                                <td class="p-4"><div class="h-4 bg-slate-200 rounded w-32"></div></td>
                                <td class="p-4">
                                    <div class="flex items-center gap-2">
                                        <div class="w-6 h-6 bg-slate-200 rounded-full"></div>
                                        <div class="h-4 bg-slate-200 rounded w-16"></div>
                                    </div>
                                </td>
                                <td class="p-4"><div class="h-8 bg-slate-200 rounded w-16"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- スマホ用 カードリスト (lg未満で表示) -->
                <div class="lg:hidden flex-1 p-4">
                    <div id="mobile-card-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- JSで挿入 -->
                    </div>
                </div>

                <!-- ローディングスピナー -->
                <div id="scroll-sentinel" class="h-16 flex justify-center items-center py-4 border-t border-slate-100">
                    <div id="loading-more-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-blue-600"></div>
                </div>
            </div>

        </main>

        <!-- スマホ用ボトムナビゲーション -->
        <nav class="lg:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50 px-6 py-3 pb-safe">
            <div class="flex justify-between items-center">
                <a href="/dashboard.html" class="flex flex-col items-center text-slate-400 hover:text-slate-600">
                    <i class="fas fa-home text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">ホーム</span>
                </a>
                <a href="/business_card_creation.html" class="relative -top-6 w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-full shadow-lg shadow-blue-500/30 flex items-center justify-center text-white transform hover:scale-105 transition-transform">
                    <i class="fas fa-camera text-2xl"></i>
                </a>
                <a href="/business_card_list.html" class="flex flex-col items-center text-blue-600">
                    <i class="fas fa-address-book text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">ネットワーク</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="app.js"></script>
    <script src="list.js"></script>
</body>
</html>
