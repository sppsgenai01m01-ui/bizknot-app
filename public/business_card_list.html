<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 名刺一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen overflow-x-hidden">

    <!-- 共通トップヘッダー (PC/スマホ共通) -->
    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/dashboard.html" class="flex items-center"><h1 class="text-xl font-bold text-blue-600">BizKnot</h1></a>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="/dashboard.html" class="text-slate-500 hover:text-slate-700 px-3 py-2 rounded-md text-sm font-medium">ダッシュボード</a>
                    <a href="/business_card_list.html" class="text-blue-600 px-3 py-2 rounded-md text-sm font-bold">名刺一覧</a>
                    <a href="/settings.html" class="text-slate-500 hover:text-slate-700 px-3 py-2 rounded-md text-sm font-medium">設定</a>
                    <button id="logout-button" class="text-slate-500 hover:text-slate-700 px-3 py-2 rounded-md text-sm font-medium">ログアウト</button>
                </nav>
                <div class="md:hidden flex items-center">
                </div>
            </div>
        </div>
    </header>

    <!-- メインコンテンツエリア -->
    <div class="flex-1 flex flex-col relative">

        <!-- スクロール可能なメイン領域 -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 lg:pb-8 flex flex-col">
            
            <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col">
                <!-- ヘッダー（PC用） -->
                <div class="hidden md:flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">名刺一覧</h2>
                    <button id="export-csv-button" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-semibold py-2 px-4 rounded-lg shadow-sm transition duration-200 text-sm flex items-center">
                        <i class="fas fa-download mr-2 text-green-600"></i>
                        CSVエクスポート
                    </button>
                </div>

                <!-- 検索フォーム -->
                <div class="glass-panel p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 bg-white flex-shrink-0">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="relative flex-1">
                            <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                            <input type="text" id="search-keyword" placeholder="会社名、氏名、部署で検索..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        </div>
                        <button id="search-button" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 font-bold shadow-sm transition duration-200 flex-shrink-0">
                            検索
                        </button>
                    </div>
                    
                    <!-- 詳細検索トグル -->
                    <div class="mt-4">
                        <button id="toggle-advanced-search" class="text-sm text-blue-600 font-semibold hover:underline flex items-center">
                            <i class="fas fa-chevron-down mr-1 transition-transform" id="advanced-search-icon"></i> 詳細な検索条件
                        </button>
                    </div>
                    
                    <!-- 詳細検索パネル（初期非表示） -->
                    <div id="advanced-search-panel" class="hidden mt-4 pt-4 border-t border-slate-100">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="custom-fields-search-container">
                            <!-- JSでカスタム項目検索UIを動的生成 -->
                        </div>
                    </div>
                </div>

                <!-- データコンテナ -->
                <div class="flex-1 glass-panel rounded-2xl shadow-sm border border-slate-200 bg-white overflow-hidden flex flex-col">
                    
                    <!-- PC用 データテーブル (md以上で表示) -->
                    <div class="hidden md:block overflow-x-auto flex-1">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-sm">
                                    <th class="p-4 font-semibold w-16 text-center">名刺</th>
                                    <th class="p-4 font-semibold">氏名</th>
                                    <th class="p-4 font-semibold">会社名・部署</th>
                                    <th class="p-4 font-semibold">連絡先</th>
                                    <th class="p-4 font-semibold">最終連絡日時</th>
                                    <th class="p-4 font-semibold">連絡のきっかけ</th>
                                </tr>
                            </thead>
                            <tbody id="pc-table-body" class="divide-y divide-slate-100">
                                <!-- JSで挿入 -->
                                <tr class="animate-pulse">
                                    <td class="p-4"><div class="w-10 h-10 bg-slate-200 rounded-full mx-auto"></div></td>
                                    <td class="p-4"><div class="h-4 bg-slate-200 rounded w-24"></div></td>
                                    <td class="p-4"><div class="h-4 bg-slate-200 rounded w-48 mb-1"></div><div class="h-3 bg-slate-100 rounded w-32"></div></td>
                                    <td class="p-4"><div class="h-4 bg-slate-200 rounded w-32"></div></td>
                                    <td class="p-4"><div class="h-4 bg-slate-200 rounded w-24"></div></td>
                                    <td class="p-4"><div class="h-4 bg-slate-200 rounded w-32"></div></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- スマホ用 カードリスト (md未満で表示) -->
                    <div class="md:hidden flex-1 p-4">
                        <div id="mobile-card-list" class="grid grid-cols-1 gap-4">
                            <!-- JSで挿入 -->
                        </div>
                    </div>

                    <!-- ローディングスピナー -->
                    <div id="scroll-sentinel" class="h-16 flex justify-center items-center py-4 border-t border-slate-100">
                        <div id="loading-more-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-blue-600"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- スマホ用ボトムナビゲーション（非表示化） -->
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="app.js"></script>
    <script src="list.js"></script>
</body>
</html>
