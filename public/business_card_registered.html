
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 登録完了</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center text-center p-4">

    <div class="bg-white p-8 md:p-12 rounded-lg shadow-md max-w-md w-full">
        <!-- サクセスアイコン -->
        <div class="mx-auto bg-green-100 rounded-full h-20 w-20 flex items-center justify-center">
            <svg class="h-12 w-12 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- メッセージ -->
        <h1 class="text-2xl font-bold mt-6">名刺を登録しました</h1>
        <div id="registered-card-info" class="mt-4 text-gray-600 bg-gray-50 p-4 rounded-md">
            <p id="card-info-placeholder">読み込み中...</p>
        </div>

        <!-- アクションボタン -->
        <div class="mt-8 space-y-4 md:space-y-0 md:space-x-4 flex flex-col md:flex-row">
            <a href="/business_card_creation.html" id="register-more-button" class="flex-1 bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg">
                続けて登録する
            </a>
            <a href="/business_card_list.html" id="view-list-button" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg">
                名刺一覧を見る
            </a>
        </div>
    </div>

    <script>
        // Firebaseの初期化とデータ表示
        const firebaseConfig = {
            apiKey: "AIzaSyDGYmSxCNuf5bpZfQe5e-T0bvUXkU6zXfg",
            authDomain: "bizknot-asever.firebaseapp.com",
            projectId: "bizknot-asever",
            storageBucket: "bizknot-asever.firebasestorage.app",
            messagingSenderId: "103308146429",
            appId: "1:103308146429:web:474099dc997f0dc85b3094"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const cardInfoPlaceholder = document.getElementById('card-info-placeholder');
        const urlParams = new URLSearchParams(window.location.search);
        const cardId = urlParams.get('id');

        if (cardId) {
            db.collection('businessCards').doc(cardId).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        cardInfoPlaceholder.innerHTML = `
                            <p class="font-semibold text-lg">${data.companyName || ''}</p>
                            <p>${data.personName || ''}</p>
                        `;
                    } else {
                         cardInfoPlaceholder.textContent = '登録情報の取得に失敗しました。';
                    }
                })
                .catch(err => {
                     console.error("Error fetching document:", err);
                     cardInfoPlaceholder.textContent = 'エラーが発生しました。';
                });
        }

        // 履歴の操作: ユーザーがブラウザバックでフォームに戻るのを防ぐ
        history.pushState(null, '', location.href);
        window.addEventListener('popstate', function(event) {
            history.pushState(null, '', location.href);
            // ここで「戻ることはできません」のようなメッセージを出すことも可能
        });

    </script>
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <!-- Add SDKs for Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>

</body>
</html>
