    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const cardInfoPlaceholder = document.getElementById('card-info-placeholder');
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (cardId) {
                db.collection('businessCards').doc(cardId).get()
                    .then(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            cardInfoPlaceholder.innerHTML = `
                                <p class="font-bold text-xl text-gray-800 mb-2">${data.companyName || '会社名なし'}</p>
                                <p class="text-lg font-medium text-gray-600">${data.name || '氏名なし'} 様</p>
                            `;
                            cardInfoPlaceholder.classList.remove('animate-pulse');
                        } else {
                             cardInfoPlaceholder.textContent = '登録情報の取得に失敗しました。';
                        }
                    })
                    .catch(err => {
                         console.error("Error fetching document:", err);
                         cardInfoPlaceholder.textContent = 'エラーが発生しました。';
                    });
            } else {
                cardInfoPlaceholder.textContent = '正常に登録されました。';
                cardInfoPlaceholder.classList.remove('animate-pulse');
            }

            // 履歴の操作: ユーザーがブラウザバックでフォームに戻るのを防ぐ
            history.pushState(null, '', location.href);
            window.addEventListener('popstate', function(event) {
                history.pushState(null, '', location.href);
            });
        });
    </script>
</body>
