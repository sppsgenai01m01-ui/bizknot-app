<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">BizKnot</h1>
            <div class="flex items-center">
                <span id="user-display-name" class="text-gray-700 mr-4">ようこそ、<span class="font-semibold">ゲスト</span>さん</span>
                <button id="logout-button" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                    ログアウト
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <!-- Column 1 & 2: Main Info -->
            <div class="md:col-span-2 lg:col-span-3 space-y-6">
                
                <!-- Summary & Quick Actions -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Summary Card -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold text-gray-700 mb-2">サマリー</h2>
                        <div class="flex items-center">
                            <i class="fas fa-address-card fa-2x text-blue-500 mr-4"></i>
                            <div>
                                <p class="text-gray-600">登録済み名刺数</p>
                                <p id="summary-card-count" class="text-3xl font-bold">...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Actions Card -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold text-gray-700 mb-2">クイックアクション</h2>
                        <div class="flex space-x-4">
                             <button id="add-card-button" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded w-full">
                                <i class="fas fa-plus-circle mr-2"></i>名刺登録
                            </button>
                            <button id="list-cards-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">
                                <i class="fas fa-list-alt mr-2"></i>名刺一覧
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Recent Business Cards List -->
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">最近登録した名刺</h2>
                    <div id="recent-cards-list-skeleton" class="space-y-4">
                        <!-- Skeleton Loader -->
                        <div class="animate-pulse flex items-center space-x-4 p-2">
                           <div class="h-10 w-10 bg-gray-300 rounded-full"></div>
                           <div class="flex-1 space-y-2 py-1">
                               <div class="h-4 bg-gray-300 rounded w-3/4"></div>
                               <div class="h-4 bg-gray-300 rounded w-1/2"></div>
                           </div>
                        </div>
                        <div class="animate-pulse flex items-center space-x-4 p-2">
                           <div class="h-10 w-10 bg-gray-300 rounded-full"></div>
                           <div class="flex-1 space-y-2 py-1">
                               <div class="h-4 bg-gray-300 rounded w-3/4"></div>
                               <div class="h-4 bg-gray-300 rounded w-1/2"></div>
                           </div>
                        </div>
                    </div>
                    <ul id="recent-cards-list" class="space-y-2 hidden">
                        <!-- Dynamic list items will be inserted here by JS -->
                        <!-- Example: 
                        <li class="p-3 hover:bg-gray-100 rounded-md cursor-pointer border-b">
                            <p class="font-semibold text-gray-800">株式会社サンプル</p>
                            <p class="text-sm text-gray-600">山田 太郎</p>
                        </li>
                        -->
                    </ul>
                </div>
            </div>

            <!-- Column 3: Admin Menu -->
            <div id="admin-menu" class="hidden lg:col-span-1 space-y-6">
                 <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
                        <i class="fas fa-user-shield text-red-600 mr-2"></i>
                        管理者メニュー
                    </h2>
                    <div class="flex flex-col space-y-4">
                        <button id="user-management-button" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded w-full">
                            <i class="fas fa-users-cog mr-2"></i>ユーザー管理
                        </button>
                        <button id="audit-log-button" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded w-full">
                           <i class="fas fa-file-alt mr-2"></i>監査ログ
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>
    
    <!-- Firebase SDKs - Loaded from CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

    <script src="dashboard.js"></script>

</body>
</html>
