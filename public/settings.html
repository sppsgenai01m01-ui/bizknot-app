
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizKnot - 設定</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
    <script src="/app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- (ヘッダーは変更なし) -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">設定</h1>
        <a href="/dashboard.html" class="text-sm text-blue-600 hover:underline">ダッシュボードに戻る</a>
    </header>

    <!-- メインコンテンツ -->
    <main id="settings-container" class="p-4 md:p-8">

        <!-- (タブ部分は変更なし) -->
        <!-- タブナビゲーション追加 -->
        <div class="mb-8 border-b border-gray-200">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button id="tab-custom-fields" class="border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    カスタム項目設定
                </button>
                <button id="tab-ai-settings" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    AIアプローチ設定
                </button>
            </nav>
        </div>

        <div>
            <!-- (ユーザー管理は省略されているのでそのまま) -->
            <div id="content-user-management" class="hidden">
                <!-- ... -->
            </div>

            <!-- ▼▼ カスタム項目設定タブの中身を実装 ▼▼ -->
            <div id="content-custom-fields">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-gray-600">名刺に登録する独自の項目を定義します。ここで設定した項目は、登録・編集画面などに反映されます。</p>
                    <button id="add-field-button" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600">+ 新規項目を追加</button>
                </div>
                <div class="bg-white shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">項目名 (ラベル)</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">項目ID (キー)</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">タイプ</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">必須</th>
                                <th class="relative px-6 py-3"><span class="sr-only">編集</span></th>
                            </tr>
                        </thead>
                        <tbody id="field-list-body" class="bg-white divide-y divide-gray-200">
                            <!-- カスタム項目がここに動的に追加される -->
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- ▼▼ AIアプローチ設定タブ ▼▼ -->
            <div id="content-ai-settings" class="hidden">
                <div class="mb-8 bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">アプローチアラート期間設定</h3>
                    <p class="text-sm text-gray-500 mb-4">名刺登録日、または最後にAIアプローチを作成した日から何ヶ月経過したらアラートを上げるかを設定します。（1〜60ヶ月）</p>
                    <div class="flex items-center space-x-4">
                        <input type="number" id="alert-period-input" min="1" max="60" class="p-2 border border-gray-300 rounded-md w-24">
                        <span class="text-sm text-gray-700">ヶ月</span>
                        <button id="save-alert-period-btn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">保存</button>
                    </div>
                </div>

                <div class="bg-white shadow rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h3 class="text-lg font-medium text-gray-900">AIプロンプト（指示文）設定</h3>
                            <p class="text-sm text-gray-500">名刺詳細画面でAIにメールを作成させる際に選べる「デフォルトのプロンプト」を複数登録できます。</p>
                        </div>
                        <button id="add-prompt-btn" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600">+ プロンプト追加</button>
                    </div>
                    <ul id="prompt-list" class="divide-y divide-gray-200">
                        <!-- JSで動的に追加 -->
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <!-- (ユーザー管理関連のモーダルは変更なし) -->

    <!-- AIプロンプト追加/編集モーダル -->
    <div id="ai-prompt-modal" class="fixed z-30 inset-0 overflow-y-auto hidden">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true"><div class="absolute inset-0 bg-gray-500 opacity-75"></div></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 id="prompt-modal-title" class="text-lg leading-6 font-medium text-gray-900">AIプロンプトの追加</h3>
                    <input type="hidden" id="edit-prompt-id">
                    <div class="mt-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">タイトル（管理用）</label>
                            <input type="text" id="prompt-title" placeholder="例: 丁寧な営業メール（初回）" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">プロンプト内容</label>
                            <textarea id="prompt-text" rows="6" placeholder="以下の情報を元に、丁寧なトーンで営業メールを作成してください。" class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></textarea>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button id="save-prompt-btn" type="button" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 sm:ml-3 sm:w-auto sm:text-sm">保存</button>
                    <button id="cancel-prompt-btn" type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:w-auto sm:text-sm">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ▼▼ カスタム項目追加/編集モーダル ▼▼ -->
    <div id="add-field-modal" class="fixed z-30 inset-0 overflow-y-auto hidden">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true"><div class="absolute inset-0 bg-gray-500 opacity-75"></div></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 id="field-modal-title" class="text-lg leading-6 font-medium text-gray-900">新規カスタム項目の追加</h3>
                    <input type="hidden" id="edit-field-id">
                    <div class="mt-4 space-y-4">
                        <div>
                            <label for="field-label" class="block text-sm font-medium text-gray-700">項目名 (ラベル)</label>
                            <input type="text" id="field-label" placeholder="例: 重要度" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label for="field-key" class="block text-sm font-medium text-gray-700">項目ID (キー)</label>
                            <input type="text" id="field-key" placeholder="例: importance (英数字)" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label for="field-type" class="block text-sm font-medium text-gray-700">フィールドタイプ</label>
                            <select id="field-type" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                                <option value="text">一行テキスト</option>
                                <option value="textarea">複数行テキスト</option>
                                <option value="number">数値</option>
                                <option value="date">日付</option>
                                <option value="select">選択肢 (未実装)</option> 
                            </select>
                        </div>
                        <div class="flex items-start">
                            <div class="flex items-center h-5">
                                <input id="field-is-required" type="checkbox" class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-gray-300 rounded">
                            </div>
                            <div class="ml-3 text-sm">
                                <label for="field-is-required" class="font-medium text-gray-700">必須項目にする</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button id="save-field-button" type="button" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 sm:ml-3 sm:w-auto sm:text-sm">保存</button>
                    <button id="cancel-field-button" type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:w-auto sm:text-sm">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/settings.js"></script>
</body>
</html>
